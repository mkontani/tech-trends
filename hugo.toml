baseURL = "https://mkontani.github.io/tech-trends/"
languageCode = "en"
title = "tech-trends for mkontani"
paginate = 20
buildFuture = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

[params]
  description = "mkontani's daily tech trend curation"
  author = "mkontani"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  ShowRssButtonInSectionTermList = true
  defaultTheme = "auto"

[params.homeInfoParams]
  Title = "Tech Trends"
  Content = "mkontani's daily curated tech trends and articles"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/mkontani"

[[params.socialIcons]]
  name = "rss"
  url = "/tech-trends/index.xml"

[menu]
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 10

# [taxonomies]
#   tag = "tags"

[markup.highlight]
  style = "monokai"
  lineNos = false
